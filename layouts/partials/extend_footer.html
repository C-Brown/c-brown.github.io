{{- if hugo.IsProduction | or (eq site.Params.env "production") }}
<div id="cookie-consent" class="cookie-consent" style="display:none">
  <p>This site uses cookies for analytics. <a href="https://policies.google.com/technologies/partner-sites" target="_blank" rel="noopener">Learn more</a></p>
  <div class="cookie-consent-buttons">
    <button id="cookie-reject" class="cookie-btn cookie-btn-reject">Decline</button>
    <button id="cookie-accept" class="cookie-btn cookie-btn-accept">Accept</button>
  </div>
</div>
<script>
(function() {
  if (localStorage.getItem('cookie_consent')) return;
  var banner = document.getElementById('cookie-consent');
  banner.style.display = 'flex';
  document.getElementById('cookie-accept').addEventListener('click', function() {
    localStorage.setItem('cookie_consent', 'granted');
    gtag('consent', 'update', { 'analytics_storage': 'granted' });
    banner.style.display = 'none';
  });
  document.getElementById('cookie-reject').addEventListener('click', function() {
    localStorage.setItem('cookie_consent', 'denied');
    banner.style.display = 'none';
  });
})();
</script>
{{- end }}
