{{ define "main" }}
<div class="reference-container">
  {{ partial "reference-nav.html" . }}
  <article class="reference-page">
    <header class="post-header">
      <h1 class="post-title">{{ .Title }}</h1>
    </header>
    <div class="post-content">
      <iframe
        src="/references/{{ .Params.reference_file }}"
        loading="lazy"
      ></iframe>
    </div>
  </article>
</div>
{{ end }}
