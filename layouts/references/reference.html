{{ define "main" }}
<article>
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
  </header>
  <div class="post-content">
    <p><a href="/references/">← Back to Cheat Sheets</a></p>
    <iframe
      src="/references/{{ .Params.reference_file }}"
      style="width: 100%; height: 85vh; border: 1px solid #333; border-radius: 8px;"
      loading="lazy"
    ></iframe>
  </div>
</article>
{{ end }}
